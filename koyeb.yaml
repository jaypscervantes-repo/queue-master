# Koyeb service configuration for Queue Master
# Used as documentation — the actual deploy is controlled from the Koyeb dashboard.
# To use this declaratively: `koyeb app init queue-master --file koyeb.yaml`

services:
  - name: queue-master
    type: web
    git:
      repository: github.com/YOUR_USERNAME/queue-master   # update with your actual repo
      branch: main
    builder: dockerfile
    dockerfile: ./Dockerfile
    instance_types:
      - type: nano    # free tier: 256MB RAM, 0.1 vCPU
    regions:
      - sin           # Singapore — closest to PH; alternatives: fra, was, sfo
    ports:
      - port: 3000
        protocol: http
    routes:
      - path: /
        port: 3000
    scaling:
      min: 1
      max: 1
    health_checks:
      - type: tcp
        port: 3000
        grace_period: 60s
        interval: 30s
        timeout: 10s
    env:
      - key: NODE_ENV
        value: production
      # Set these as secrets in the Koyeb dashboard (not committed to git):
      # - DATABASE_URL
      # - AUTH_SECRET
      # - NEXT_PUBLIC_APP_URL
