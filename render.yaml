services:
  - type: web
    name: queue-master
    env: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    # No healthCheckPath = Render just verifies the port is open (lighter, no HTTP fetch)
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
